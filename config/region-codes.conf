#!/bin/bash
# config/region-codes.conf - Region code mappings

declare -A REGION_CODES=(
    # Asia Pacific
    ["tokyo"]="tyo"
    ["singapore"]="sin"
    ["seoul"]="sel"
    ["mumbai"]="bom"
    ["osaka"]="osa"
    ["sydney"]="syd"
    ["jakarta"]="cgk"
    ["hongkong"]="hkg"
    ["taipei"]="tpe"
    ["shanghai"]="sha"
    ["beijing"]="bjs"
    
    # Americas
    ["newyork"]="nyc"
    ["losangeles"]="lax"
    ["sanfrancisco"]="sfo"
    ["toronto"]="tor"
    ["saopaulo"]="gru"
    ["mexico"]="mex"
    
    # Europe
    ["frankfurt"]="fra"
    ["london"]="lon"
    ["amsterdam"]="ams"
    ["paris"]="cdg"
    ["madrid"]="mad"
    ["stockholm"]="arn"
    ["zurich"]="zrh"
    ["warsaw"]="waw"
    ["vienna"]="vie"
    ["milan"]="mxp"
    ["helsinki"]="hel"
    ["dublin"]="dub"
    
    # Other
    ["dubai"]="dxb"
    ["telaviv"]="tlv"
    ["capetown"]="cpt"
    ["nairobi"]="nbo"
)

get_region_code() {
    local region="$1"
    local code="${REGION_CODES[$region]}"
    if [[ -n "$code" ]]; then
        echo "$code"
    else
        echo "${region:0:3}" | tr '[:upper:]' '[:lower:]'
    fi
}
